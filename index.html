<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mirai</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fafafa;
      color: #1a1a1a;
      font-family: 'SF Mono', 'Monaco', 'Courier New', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 360px;
      width: 100%;
      text-align: left;
    }

    pre {
      line-height: 1.4;
      font-size: 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .links-list {
      margin-top: 20px;
      font-size: 15px;
    }

    .link-item {
      display: block;
    }

    .link-label {
      display: inline-block;
      color: #5a5a5a;
      font-weight: 600;
    }

    a {
      color: #0066cc;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: all 0.2s ease;
      word-break: break-all;
    }

    a:hover {
      color: #0052a3;
      border-bottom-color: #0052a3;
    }

    .hero-image {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin-bottom: 18px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
    }

    @media (max-width: 480px) {
      body {
        padding: 20px 14px;
      }

      .container {
        max-width: 100%;
      }

      pre {
        font-size: 13px;
      }

      .links-list {
        font-size: 11.5px;
      }

      .link-item {
        margin-bottom: 5px;
      }
    }

    @media (min-width: 768px) {
      body {
        padding: 60px;
      }

      pre {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="./profile.jpg" class="hero-image" loading="lazy" />

    <pre class="header"><b><a href="https://blog.mirai.host/" target="_blank" rel="noopener">BLOG</a></b> | <b><a href="https://cv.mirai.host/" target="_blank" rel="noopener">CV</a></b>
    </pre>

    <pre class="section-title"><b># other links</b></pre>

    <pre class="links-list">
<span class="link-item"><span class="link-label"><b>HackTheBox:</b></span> <a href="https://mirai.host/htb" target="_blank" rel="noopener">https://mirai.host/htb</a></span>
<span class="link-item"><span class="link-label"><b>TryHackMe:</b></span> <a href="https://mirai.host/thm" target="_blank" rel="noopener">https://mirai.host/thm</a></span>
<span class="link-item"><span class="link-label"><b>HackerOne:</b></span> <a href="https://mirai.host/h1" target="_blank" rel="noopener">https://mirai.host/h1</a></span>
<span class="link-item"><span class="link-label"><b>Bugcrowd:</b></span> <a href="https://mirai.host/bc" target="_blank" rel="noopener">https://mirai.host/bc</a></span>
<span class="link-item"><span class="link-label"><b>GitHub:</b></span> <a href="https://mirai.host/github" target="_blank" rel="noopener">https://mirai.host/github</a></span>
<span class="link-item"><span class="link-label"><b>LinkedIn:</b></span> <a href="https://mirai.host/linkedin" target="_blank" rel="noopener">https://mirai.host/linkedin</a></span>
<span class="link-item"><span class="link-label"><b>X:</b></span> <a href="https://mirai.host/x" target="_blank" rel="noopener">https://mirai.host/x</a></span>
    </pre>
  </div>
</body>
</html>
